version: '3.8'

services:
  backend:
    build: ./server
    container_name: pcb-backend
    restart: unless-stopped
    volumes:
      - pcb-data:/app/data
    expose:
      - "3000"

  frontend:
    build: .
    container_name: pcb-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pcb-data:
